services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: outpitch
      POSTGRES_PASSWORD: outpitch
      POSTGRES_DB: outpitch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U outpitch"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  cognee:
    image: cognee/cognee:latest
    ports:
      - "8000:8000"
    environment:
      ENABLE_BACKEND_ACCESS_CONTROL: "true"
      REQUIRE_AUTHENTICATION: "true"
      LLM_PROVIDER: gemini
      LLM_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      LLM_MODEL: gemini-2.0-flash
      EMBEDDING_PROVIDER: gemini
      EMBEDDING_MODEL: text-embedding-004
    volumes:
      - cognee_data:/app/.cognee_system
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  postgres_data:
  redis_data:
  cognee_data:
